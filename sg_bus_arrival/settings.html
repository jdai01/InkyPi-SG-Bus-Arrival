<div class="form-group">
    <label class="form-label">Arrival Board</label>
    <div id="watchList"></div>
    <input type="hidden" id="watches" name="watches" value="[]">
</div>

<div class="form-group" style="border: 1px solid rgba(128,128,128,0.3); border-radius: 8px; padding: 12px; display: grid; grid-template-columns: 1fr; gap: 20px;">

    <!-- Bus Stop -->
    <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; align-items: center;">
        <div style="grid-column: span 5;">
            <label class="form-label">Bus Stop</label>
        </div>

        <div style="grid-column: span 1; text-align: right;">
            <label class="form-label" for="station_id" style="margin: 0;">ID:</label>
        </div>
        <div style="grid-column: span 4;">
            <input type="text" id="station_id" name="station_id" class="form-input" style="width: 100%;" placeholder="Enter Bus Stop ID...">
        </div>
    </div>

    <!-- Buses -->
    <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; align-items: center;">
        <div style="grid-column: span 5;">
            <label class="form-label">Bus Services to Display</label>
        </div>

        <div style="grid-column: span 1; text-align: right;">
            <label class="form-label" for="bus_input_field" style="margin: 0;">Buses:</label>
        </div>
        <div style="grid-column: span 3; display: flex; gap: 8px;">
            <input type="text" id="bus_input_field" class="form-input" placeholder="e.g. 166, 5" style="flex: 1;">
        </div>
        <div style="grid-column: span 1; display: flex; gap: 8px;">
            <button type="button" id="add_bus_btn" class="action-button compact">Add</button>
        </div>

        <div></div> 
        <div id="bus_list_container" style="grid-column: span 4; display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; border: 1px dashed #ccc; border-radius: 4px; min-height: 44px; background: rgba(0,0,0,0.02);">
            <span id="empty_msg" style="opacity:0.5; font-size: 0.9em;">No buses added yet</span>
        </div>

        <input type="hidden" name="selected_buses" id="selected_buses_hidden">
    </div>

    <button type="button" id="addWatchBtn" class="form-input collapsible" onclick="addWatch()" style="width: 100%; margin-top: 10px;">
        Add to Board
    </button>
</div>


<script>
    /**
     * Populate plugin settings form fields on page load when editing an existing plugin instance.
     *
     * - `loadPluginSettings` is a boolean flag indicating whether the form
     *   is editing an existing plugin (true) or creating a new plugin (false).
     * - `pluginSettings` is an object containing saved values for this plugin.
     *
     * This script automatically fills inputs with saved settings.
     */
    document.addEventListener('DOMContentLoaded', () => {
        const busInput = document.getElementById('bus_input_field');
        const addBtn = document.getElementById('add_bus_btn');
        const container = document.getElementById('bus_list_container');
        const hiddenInput = document.getElementById('selected_buses_hidden');

        let busList = [];

        function refreshBusDisplay() {
            // 1. Sort the list: Numeric ascending, then alphabetical
            busList.sort((a, b) => {
                // Use regex to separate the leading number from any trailing letters
                const parse = (str) => {
                    const match = str.match(/^(\d+)(.*)$/);
                    return match 
                        ? { num: parseInt(match[1], 10), rest: match[2] } 
                        : { num: Infinity, rest: str }; // Fallback for non-numeric strings
                };

                const partA = parse(a);
                const partB = parse(b);

                // Compare numbers first
                if (partA.num !== partB.num) {
                    return partA.num - partB.num;
                }
                // If numbers are the same, compare the suffix (e.g., 12 vs 12A)
                return partA.rest.localeCompare(partB.rest);
            });

            // 2. Clear and Render
            container.innerHTML = '';
            if (busList.length === 0) {
                container.innerHTML = '<span style="opacity:0.5; font-size: 0.9em;">No buses added yet</span>';
            }

            busList.forEach((bus, index) => {
                const pill = document.createElement('div');
                pill.id = bus;
                pill.style.cssText = "display:flex; align-items:center; background:#00E000; color:white; padding:2px 10px; border-radius:12px; font-size:12px;";
                pill.innerHTML = `
                    <span>${bus}</span>
                    <span style="margin-left:8px; cursor:pointer;" onclick="removeBus(${index})">✕</span>
                `;
                container.appendChild(pill);
            });

            hiddenInput.value = JSON.stringify(busList);
        }

        addBtn.addEventListener('click', () => {
            const val = busInput.value.trim().toUpperCase();
            if (val && !busList.includes(val)) {
                busList.push(val);
                busInput.value = '';
                refreshBusDisplay();
            }
        });

        window.removeBus = (index) => {
            busList.splice(index, 1);
            refreshBusDisplay();
        };

        refreshBusDisplay();
    });

    function getBuses() {
        const hiddenInput = document.getElementById('selected_buses_hidden');
        
        if (hiddenInput && hiddenInput.value) {
            try {
                // Parse the JSON string back into an array
                const buses = JSON.parse(hiddenInput.value);
                console.log("Current buses:", buses);
                return buses;
            } catch (e) {
                console.error("Error parsing bus list", e);
                return [];
            }
        }
        return [];
    }



    let watches = []; // Assuming this is defined globally

    function addWatch() {
        // 1. Check if the limit (2) has already been reached
        if (watches.length >= 2) {
            alert("Maximum of 2 bus stops allowed on the arrival board.");
            return;
        }

        const station_id = document.getElementById('station_id').value;
        console.log(station_id);
        if (!station_id) return;

        const selected_buses = getBuses();
        console.log(selected_buses)
        if (selected_buses.length === 0) return;

        const watch = {
            station_id: station_id,
            selected_buses: selected_buses,
        };
        console.log(watch);

        watches.push(watch);
        renderWatchList();

        // Reset the form
        document.getElementById('sel_station').value = '';
        document.getElementById('sel_direction').value = '';
        document.getElementById('lineCheckboxes').innerHTML = '<span style="opacity:0.5;">Select a station first</span>';
        
        // Update button state immediately
        checkLimit();
    }

    function removeWatch(index) {
        watches.splice(index, 1);
        renderWatchList();
        checkLimit(); // Re-enable the button if a stop was removed
    }

    /**
     * Helper to disable/enable the Add button based on list size
     */
    function checkLimit() {
        const addBtn = document.getElementById('addWatchBtn');
        if (watches.length >= 2) {
            addBtn.disabled = true;
            addBtn.title = "Maximum 2 stops reached";
        } else {
            // Only enable if a station is actually selected (logic may vary based on your UI)
            const cid = document.getElementById('sel_station').value;
            addBtn.disabled = !cid; 
            addBtn.title = "";
        }
    }

    function renderWatchList() {
        const container = document.getElementById('watchList');
        const hiddenInput = document.getElementById('watches');
        
        if (hiddenInput) {
            hiddenInput.value = JSON.stringify(watches);
        }

        container.innerHTML = '';
        if (watches.length === 0) {
            container.innerHTML = '<div style="opacity:0.5; padding:8px 0;">No stations added yet. Use the form below to add stations to your board.</div>';
            return;
        }

        watches.forEach((w, i) => {
            const row = document.createElement('div');
            row.className = 'form-group';
            row.style.cssText = 'display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid rgba(128,128,128,0.2);';

            const text = document.createElement('div');
            text.style.flex = '1';

            const lineDesc = w.selected_buses
            
            text.textContent = `${w.station_name} — ${selected_buses}`;

            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.innerText = '✕';
            removeBtn.classList.add('remove-btn');
            removeBtn.onclick = () => removeWatch(i);

            row.appendChild(text);
            row.appendChild(removeBtn);
            container.appendChild(row);
        });
    }
</script>
