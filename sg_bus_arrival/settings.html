        <label class="form-label" for="sel_station" >Bus Stop: </label>

    <div class="form-group">
        <label for="sel_lines" class="form-label">Buses</label>
        <div id="lineCheckboxes" class="form-group" style="display:flex; flex-wrap:wrap; gap:6px;">
            <span style="opacity:0.5;">Select a bus stop first</span>
        </div>
    </div>

    <button type="button" id="addWatchBtn" class="form-input collapsible" onclick="addWatch()" disabled>Add to Board</button>
</div>
